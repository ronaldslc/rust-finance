# deny.toml — place in repo root
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-pc-windows-msvc",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
]
all-features = true

# ── Advisories (CVE / RUSTSEC) ────────────────────────────────
[advisories]
vulnerability = "deny"        # hard-fail on known CVEs
unmaintained = "warn"
yanked = "deny"
notice = "warn"
ignore = []                   # e.g. ["RUSTSEC-2024-XXXX"]

# ── Licenses ──────────────────────────────────────────────────
[licenses]
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "OpenSSL",
    "MPL-2.0",
]
copyleft = "deny"
confidence-threshold = 0.8

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[[licenses.clarify]]
name = "webpki"
expression = "ISC"
license-files = [{ path = "LICENSE", hash = 0x001c7e6c }]

# ── Bans ──────────────────────────────────────────────────────
[bans]
multiple-versions = "warn"
wildcards = "deny"              # prevent `*` version specs
highlight = "all"

deny = [
    # Force pure-Rust TLS via rustls — ban OpenSSL C bindings
    { crate = "openssl", use-instead = "rustls" },
    { crate = "openssl-sys", use-instead = "rustls" },
    # Ban known-problematic crates
    { crate = "cmake" },
]

skip = []
skip-tree = []

# ── Sources ───────────────────────────────────────────────────
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
