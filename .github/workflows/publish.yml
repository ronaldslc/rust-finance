# .github/workflows/publish.yml
name: "Publish to crates.io"

on:
  push:
    tags: ["v*"]

permissions: {}

jobs:
  publish:
    name: "Publish crates"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@stable

      # Publish crates in dependency order
      - name: Publish common
        run: cargo publish -p common --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true

      - name: Publish ingestion
        run: cargo publish -p ingestion --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true

      - name: Publish execution
        run: cargo publish -p execution --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true

      - name: Publish cli
        run: cargo publish -p cli --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true
