name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: rustforge-windows-x64
            tui_bin: tui.exe
            daemon_bin: daemon.exe
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: rustforge-macos-intel
            tui_bin: tui
            daemon_bin: daemon
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: rustforge-macos-arm64
            tui_bin: tui
            daemon_bin: daemon
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: rustforge-linux-x64
            tui_bin: tui
            daemon_bin: daemon

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binaries
        run: cargo build --release -p tui -p daemon --target ${{ matrix.target }}

      - name: Package artifacts
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.tui_bin }} dist/
          cp target/${{ matrix.target }}/release/${{ matrix.daemon_bin }} dist/
          cp installer/alacritty.toml dist/ 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create archives
        run: |
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            if [[ "$name" == *"windows"* ]]; then
              (cd "$name" && zip -r "../${name}.zip" .)
            else
              tar -czf "${name}.tar.gz" -C "$name" .
            fi
          done

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.zip
            artifacts/*.tar.gz
