# .github/workflows/release.yml
name: "Release"

on:
  push:
    tags: ["v*"]

permissions: {}

jobs:
  build-and-sign:
    name: "Build & Sign (${{ matrix.target }})"
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write      # upload release assets
      id-token: write      # Sigstore OIDC keyless signing
      attestations: write  # GitHub Attestations
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: daemon
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: tui
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: cli
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: daemon
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: tui
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: cli
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: daemon
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: tui
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: cli
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          key: release-${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p ${{ matrix.binary }}

      - name: Install cosign
        if: runner.os != 'Windows'
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0

      # Keyless signing with Sigstore (uses GitHub OIDC identity)
      - name: Sign binary with cosign (keyless)
        if: runner.os != 'Windows'
        run: |
          BINARY="target/${{ matrix.target }}/release/${{ matrix.binary }}"
          cosign sign-blob "$BINARY" \
            --yes \
            --bundle "${BINARY}.sigstore.json"

      # Generate SHA256 checksums
      - name: Generate checksums (Unix)
        if: runner.os != 'Windows'
        run: |
          BINARY="target/${{ matrix.target }}/release/${{ matrix.binary }}"
          sha256sum "$BINARY" > "${BINARY}.sha256"

      - name: Generate checksums (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $binary = "target/${{ matrix.target }}/release/${{ matrix.binary }}.exe"
          $hash = (Get-FileHash $binary -Algorithm SHA256).Hash
          "$hash  $binary" | Out-File -FilePath "${binary}.sha256" -Encoding utf8

      # GitHub Artifact Attestation (provenance)
      - name: Attest build provenance
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018 # v2.1.0
        with:
          subject-path: "target/${{ matrix.target }}/release/${{ matrix.binary }}${{ runner.os == 'Windows' && '.exe' || '' }}"

      - name: Upload release assets
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          files: |
            target/${{ matrix.target }}/release/${{ matrix.binary }}${{ runner.os == 'Windows' && '.exe' || '' }}
            target/${{ matrix.target }}/release/${{ matrix.binary }}${{ runner.os == 'Windows' && '.exe' || '' }}.sigstore.json
            target/${{ matrix.target }}/release/${{ matrix.binary }}${{ runner.os == 'Windows' && '.exe' || '' }}.sha256
